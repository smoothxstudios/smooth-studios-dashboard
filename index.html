<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Smooth Studios Display</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="bg"></div>

  <!-- SCREENSAVER MODE (shows when NOT currently in session) -->
  <div id="screensaver" class="screensaver">
    <!-- Customize: swap logo.png with your file name if needed -->
    <img id="ssLogo" class="ssLogo" src="logo.png" alt="Smooth Studios Logo" />
  </div>

  <!-- SESSION CARD (shows ONLY when currently in session) -->
  <main id="sessionUI" class="wrap hidden">
    <div class="card">
      <div class="top">
        <div class="brand">
          <!-- Logo in the header -->
          <div class="logoWrap">
            <!-- Customize: change logo size in CSS: .headerLogo -->
            <img class="headerLogo" src="logo.png" alt="Smooth Studios Logo" />
          </div>

        <div class="pill live" id="statusPill">In Session</div>
      </div>

      <div class="headline" id="line">
        Welcome To Smooth Studios <span class="clientName" id="clientName">Client</span>
      </div>

      <div class="meta">
        <div class="metaRow" id="timeRow">—</div>
        <div class="metaRow muted" id="dateRow">—</div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
