<!-- index.html (FULL) -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Smooth Studios Display</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="bg"></div>
  <div class="noise"></div>

  <!-- SCREENSAVER (fades in/out) -->
  <div id="screensaver" class="screensaver isHidden">
    <img id="ssLogo" class="ssLogo" src="logo.png" alt="Smooth Studios Logo" />
  </div>

  <!-- SESSION UI (fades in/out) -->
  <main id="sessionUI" class="wrap isHidden" aria-live="polite">
    <div class="stack">
      <div class="card">
        <div class="headline">WELCOME TO SMOOTH STUDIOS</div>

        <div class="clientLine">
          <span class="clientName" id="clientName">CLIENT</span>
        </div>

        <div class="meta">
          <div class="metaRow" id="timeRow">APPOINTMENT TIME: —</div>
          <div class="metaRow muted" id="dateRow">—</div>
        </div>
      </div>

      <!-- NEXT UP bubble (shows only in last 10 mins AND if next exists) -->
      <div id="nextUpBubble" class="nextUp isHidden">
        <div class="nextUpLabel">UP NEXT</div>
        <div class="nextUpValue" id="nextUpValue">—</div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
