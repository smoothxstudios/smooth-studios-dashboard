<!-- index.html (FULL) -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Smooth Studios Display</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="bg"></div>

  <!-- SCREENSAVER MODE (shows when NOT currently in session) -->
  <div id="screensaver" class="screensaver">
    <img id="ssLogo" class="ssLogo" src="logo.png" alt="Smooth Studios Logo" />
  </div>

  <!-- SESSION UI (shows ONLY when currently in session) -->
  <main id="sessionUI" class="wrap hidden">
    <div class="card">
      <div class="headline">
        <span class="welcomeText">WELCOME TO SMOOTH STUDIOS</span>
      </div>

      <!-- Client on their own line -->
      <div class="clientLine">
        <span class="clientName" id="clientName">CLIENT</span>
      </div>

      <div class="meta">
        <div class="metaRow" id="timeRow">APPOINTMENT TIME: —</div>
        <div class="metaRow muted" id="dateRow">—</div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
