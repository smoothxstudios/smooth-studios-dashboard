<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Smooth Studios Display</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg"></div>

  <main class="wrap">
    <div class="card">
      <div class="top">
        <div class="brand">
          <div class="logo">S</div>
          <div class="brandtext">
            <div class="brandname">Smooth Studios</div>
            <div class="brandtag">Studio Schedule</div>
          </div>
        </div>

        <div class="pill" id="statusPill">Loading</div>
      </div>

      <div class="headline" id="line">Welcome To Smooth Studios</div>

      <div class="meta">
        <div class="metaRow" id="timeRow">—</div>
        <div class="metaRow muted" id="dateRow">—</div>
      </div>
    </div>

    <footer class="footer">
      <span class="hint">Please Check In At The Front Desk</span>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
