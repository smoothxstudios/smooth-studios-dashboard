<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Smooth Studios Display</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="bg"></div>

  <!-- SCREENSAVER MODE -->
  <div id="screensaver" class="screensaver">
    <img id="ssLogo" class="ssLogo" src="logo.png" alt="Smooth Studios Logo" />
  </div>

  <!-- SESSION UI (only when isLive === true) -->
  <main id="sessionUI" class="wrap hidden">
    <div class="card">
      <div class="top">
        <div class="brand">
          <div class="logoWrap">
            <img class="headerLogo" src="logo.png" alt="Smooth Studios Logo" />
          </div>
          <div class="brandtext">
            <div class="brandtag">Studio Schedule</div>
          </div>
        </div>

        <div class="pill live" id="statusPill">In Session</div>
      </div>

      <div class="headline" id="line">
  Welcome To
  <img
    src="logolong.png"
    alt="Smooth Studios"
    class="inlineLogo"
  />
  <span class="clientName" id="clientName">Client</span>
</div>


      <div class="meta">
        <div class="metaRow" id="timeRow">—</div>
        <div class="metaRow muted" id="dateRow">—</div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
